<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Juujuu!</title>
  
  <!-- Canvas Confetti Library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <style>
    /* Global Reset & Dark Theme */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: radial-gradient(circle at center, #1b0228, #090010);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* 1. Black Overlay Screen (30 Seconds) */
    #black-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #000000;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 1;
      transition: opacity 1s ease;
    }

    #black-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loading-text {
      color: #bb86fc;
      font-size: 1.3rem;
      letter-spacing: 2px;
      animation: pulse 2s infinite;
      margin-bottom: 25px;
    }

    /* Primary Buttons */
    .btn {
      background: linear-gradient(135deg, #8a2be2, #4a00e0);
      color: #ffffff;
      font-size: 1.2rem;
      font-weight: bold;
      padding: 14px 35px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(138, 43, 226, 0.6);
      transition: all 0.3s ease;
      outline: none;
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 0 30px rgba(187, 134, 252, 0.9);
    }

    /* Show On Button */
    #show-on-btn {
      display: none;
    }

    /* 2. Main Birthday Card */
    .card-container {
      display: none;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(187, 134, 252, 0.2);
      border-radius: 20px;
      padding: 40px 30px;
      max-width: 500px;
      width: 90%;
      text-align: center;
      box-shadow: 0 10px 40px rgba(138, 43, 226, 0.3);
      position: relative;
      z-index: 10;
      animation: fadeIn 1.2s ease forwards;
    }

    .title {
      font-size: 2.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #e0b0ff, #ff69b4, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 15px;
      text-shadow: 0 0 20px rgba(155, 81, 224, 0.5);
      animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .message {
      font-size: 1.1rem;
      color: #d8c4f0;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    /* 3. Floating Heart Balloons */
    .balloon-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }

    .heart-balloon {
      position: absolute;
      bottom: -100px;
      font-size: 2.5rem;
      animation: floatUp 8s linear infinite;
      opacity: 0.85;
    }

    /* Rose Shower Container (Appears on last step) */
    .rose-shower-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .rose-element {
      position: absolute;
      top: -100px;
      font-size: 1.8rem;
      animation: rainDown linear infinite;
      opacity: 0.95;
    }

    /* 4. Brighter Large Background Double Heart */
    #heart-bg {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 25rem;
      opacity: 0.45; /* Increased opacity for brighter look */
      filter: drop-shadow(0 0 25px rgba(255, 105, 180, 0.8)); /* Added glow filter */
      z-index: 0;
      pointer-events: none;
      animation: floatPulse 3s infinite ease-in-out;
      user-select: none;
    }

    /* Date Section */
    #date-section {
      display: none;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px dashed rgba(187, 134, 252, 0.3);
      animation: fadeIn 1s ease forwards;
    }

    .date-text {
      font-size: 1.3rem;
      font-weight: 700;
      color: #ffb7c5;
      text-shadow: 0 0 10px rgba(255, 183, 197, 0.7);
      margin-bottom: 20px;
    }

    .button-group {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .choice-btn {
      background: linear-gradient(135deg, #ff4081, #e91e63);
      box-shadow: 0 0 15px rgba(233, 30, 99, 0.6);
      padding: 12px 25px;
      font-size: 1.1rem;
    }

    /* Kiss / Hug Options Section */
    #affection-section {
      display: none;
      margin-top: 20px;
      animation: fadeIn 1s ease forwards;
    }

    /* Keyframe Animations */
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.9;
      }
      100% {
        transform: translateY(-110vh) rotate(20deg);
        opacity: 0;
      }
    }

    @keyframes rainDown {
      0% {
        transform: translateY(0) rotate(0deg) translateX(0);
        opacity: 0.95;
      }
      100% {
        transform: translateY(110vh) rotate(360deg) translateX(25px);
        opacity: 0;
      }
    }

    @keyframes floatPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.12); }
    }
  </style>
</head>
<body>

  <!-- 1. Black Screen Overlay -->
  <div id="black-screen">
    <p id="loading-msg" class="loading-text">✨ Preparing your special surprise...</p>
    <button id="show-on-btn" class="btn" onclick="revealBirthdayCard()">Show On</button>
  </div>

  <!-- Effect Containers -->
  <div id="rose-shower-container" class="rose-shower-container"></div>
  <div id="balloon-container" class="balloon-container"></div>

  <!-- Brighter Large Double Heart Background -->
  <div id="heart-bg">💕</div>

  <!-- 2. Birthday Wish Card -->
  <div id="main-card" class="card-container">
    <h1 class="title">Happy Birthday Juujuu! 💕🎉</h1>
    <p class="message">
      May your year ahead be filled with endless joy, unforgettable moments, and incredible success with me.
    </p>
    
    <button id="celebrate-btn" class="btn" onclick="celebrate()">Celebrate ✨</button>

    <!-- 3. Date Invitation Section -->
    <div id="date-section">
      <div id="first-question">
        <p class="date-text">will come out for dating in aug 9?</p>
        <div class="button-group">
          <button class="btn choice-btn" onclick="acceptDate()">i will</button>
          <button class="btn choice-btn" onclick="acceptDate()">i will</button>
        </div>
      </div>

      <!-- 4. Follow-up Affection Section -->
      <div id="affection-section">
        <p class="date-text">Yay! Will you give a Kiss, Hug, or Both on Aug 9? 😘</p>
        <div class="button-group">
          <button class="btn choice-btn" onclick="finalChoice('Kiss 💋')">Kiss 💋</button>
          <button class="btn choice-btn" onclick="finalChoice('Hug 🫂')">Hug 🫂</button>
          <button class="btn choice-btn" onclick="finalChoice('Both 💋🫂')">Both! 💋🫂</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 1. Reveal "Show On" button after 30 seconds
    setTimeout(() => {
      document.getElementById('loading-msg').style.display = 'none';
      document.getElementById('show-on-btn').style.display = 'inline-block';
    }, 30000);

    // 2. Hide Black Screen & Reveal Card + Heart Balloons ONLY
    function revealBirthdayCard() {
      const blackScreen = document.getElementById('black-screen');
      blackScreen.classList.add('fade-out');
      
      setTimeout(() => {
        blackScreen.style.display = 'none';
        document.getElementById('main-card').style.display = 'block';
        startFlyingBalloons();
      }, 1000);
    }

    // Spawn Flying Heart Balloons
    function startFlyingBalloons() {
      const container = document.getElementById('balloon-container');
      const balloonIcons = ['💖', '❤️', '💕', '💗', '💓'];
      
      setInterval(() => {
        const balloon = document.createElement('div');
        balloon.className = 'heart-balloon';
        balloon.innerText = balloonIcons[Math.floor(Math.random() * balloonIcons.length)];
        balloon.style.left = Math.random() * 100 + 'vw';
        balloon.style.animationDuration = (6 + Math.random() * 4) + 's';
        
        container.appendChild(balloon);
        
        setTimeout(() => {
          balloon.remove();
        }, 10000);
      }, 500);
    }

    // 3. Celebrate Action
    function celebrate() {
      document.getElementById('heart-bg').style.display = 'block';
      document.getElementById('celebrate-btn').style.display = 'none';
      document.getElementById('date-section').style.display = 'block';

      triggerAllSidesCheerPaper();
    }

    // 4. Handle "i will" click
    function acceptDate() {
      document.getElementById('first-question').style.display = 'none';
      document.getElementById('affection-section').style.display = 'block';

      triggerAllSidesCheerPaper();
    }

    // 5. Handle Final Choice (Triggers Rose Shower NOW)
    function finalChoice(option) {
      alert(`Can't wait for Aug 9! Sending you lots of love for choosing ${option}! ❤️✨`);
      
      triggerAllSidesCheerPaper();
      startRoseShower(); // Rose shower begins on the final step!
    }

    // Cheer Paper Cannon from left & right sides
    function triggerAllSidesCheerPaper() {
      const colors = ['#ff0055', '#ff4081', '#8a2be2', '#9b51e0', '#ffffff', '#ffd700'];

      // Left Side Burst
      confetti({
        particleCount: 80,
        angle: 60,
        spread: 70,
        origin: { x: 0, y: 0.7 },
        colors: colors
      });

      // Right Side Burst
      confetti({
        particleCount: 80,
        angle: 120,
        spread: 70,
        origin: { x: 1, y: 0.7 },
        colors: colors
      });

      // Center High Burst
      confetti({
        particleCount: 100,
        spread: 100,
        origin: { y: 0.5 },
        colors: colors
      });
    }

    // Continuous Rose Flower Shower (Starts only at the end)
    function startRoseShower() {
      const container = document.getElementById('rose-shower-container');
      const roseIcons = ['🌹', '🥀', '🌺'];
      
      setInterval(() => {
        const rose = document.createElement('div');
        rose.className = 'rose-element';
        rose.innerText = roseIcons[Math.floor(Math.random() * roseIcons.length)];
        rose.style.left = Math.random() * 100 + 'vw';
        rose.style.fontSize = (1.5 + Math.random() * 1) + 'rem';
        rose.style.animationDuration = (4 + Math.random() * 4) + 's';
        
        container.appendChild(rose);
        
        setTimeout(() => {
          rose.remove();
        }, 9000);
      }, 200);
    }
  </script>
</body>
</html>
