<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Juujuu!</title>
  
  <!-- Canvas Confetti Library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <style>
    /* Global Reset & Dark Theme */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: radial-gradient(circle at center, #1b0228, #090010);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* 1. Pure Black Overlay Screen */
    #black-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #000000;
      z-index: 99999;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 1;
      transition: opacity 1s ease;
    }

    #black-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Floating Heart Box containing the Show On button */
    .heart-button-wrapper {
      position: relative;
      width: 220px;
      height: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: fadeInSlow 2.5s ease forwards;
    }

    .heart-shape {
      position: absolute;
      font-size: 14rem;
      user-select: none;
      filter: drop-shadow(0 0 25px rgba(255, 105, 180, 0.9));
      animation: floatPulse 2.5s infinite ease-in-out;
      z-index: 1;
    }

    /* Primary Buttons */
    .btn {
      position: relative;
      z-index: 2;
      background: linear-gradient(135deg, #8a2be2, #4a00e0);
      color: #ffffff;
      font-size: 1.2rem;
      font-weight: bold;
      padding: 14px 35px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.8), 0 0 15px rgba(138, 43, 226, 0.8);
      transition: all 0.3s ease;
      outline: none;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 35px rgba(255, 255, 255, 1);
    }

    #heart-wrapper {
      display: none;
    }

    /* 2. Interactive Single Heart Screen */
    #single-heart-screen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 50;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      animation: fadeIn 1s ease forwards;
    }

    .single-heart {
      font-size: 12rem;
      cursor: pointer;
      user-select: none;
      filter: drop-shadow(0 0 35px rgba(255, 20, 147, 0.9));
      animation: floatPulse 2s infinite ease-in-out;
      transition: transform 0.3s ease;
    }

    .single-heart:hover {
      transform: scale(1.2);
    }

    .click-prompt {
      margin-top: 15px;
      font-size: 1.2rem;
      color: #ffb7c5;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(255, 183, 197, 0.7);
      animation: pulseText 1.5s infinite ease-in-out;
    }

    /* 3. Main Birthday Card */
    .card-container {
      display: none;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(187, 134, 252, 0.2);
      border-radius: 20px;
      padding: 40px 30px;
      max-width: 500px;
      width: 90%;
      text-align: center;
      box-shadow: 0 10px 40px rgba(138, 43, 226, 0.3);
      position: relative;
      z-index: 10;
      animation: fadeIn 1.2s ease forwards;
    }

    .title {
      font-size: 2.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #e0b0ff, #ff69b4, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 15px;
      text-shadow: 0 0 20px rgba(155, 81, 224, 0.5);
      animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .message {
      font-size: 1.1rem;
      color: #d8c4f0;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    /* 4. Floating Heart Balloons */
    .balloon-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }

    .heart-balloon {
      position: absolute;
      bottom: -100px;
      font-size: 2.5rem;
      animation: floatUp 8s linear infinite;
      opacity: 0.85;
    }

    /* Brighter Large Background Double Heart */
    #heart-bg {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 25rem;
      opacity: 0.45;
      filter: drop-shadow(0 0 25px rgba(255, 105, 180, 0.8));
      z-index: 0;
      pointer-events: none;
      animation: floatPulse 3s infinite ease-in-out;
      user-select: none;
    }

    /* Date Section */
    #date-section {
      display: none;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px dashed rgba(187, 134, 252, 0.3);
      animation: fadeIn 1s ease forwards;
    }

    .date-text {
      font-size: 1.3rem;
      font-weight: 700;
      color: #ffb7c5;
      text-shadow: 0 0 10px rgba(255, 183, 197, 0.7);
      margin-bottom: 20px;
    }

    .button-group {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .choice-btn {
      background: linear-gradient(135deg, #ff4081, #e91e63);
      box-shadow: 0 0 15px rgba(233, 30, 99, 0.6);
      padding: 12px 25px;
      font-size: 1.1rem;
    }

    /* Kiss / Hug Options Section */
    #affection-section {
      display: none;
      margin-top: 20px;
      animation: fadeIn 1s ease forwards;
    }

    /* Keyframe Animations */
    @keyframes fadeInSlow {
      0% { opacity: 0; transform: scale(0.7); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.9;
      }
      100% {
        transform: translateY(-110vh) rotate(20deg);
        opacity: 0;
      }
    }

    @keyframes floatPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    @keyframes pulseText {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- 1. Pure Black Screen Overlay -->
  <div id="black-screen">
    <div id="heart-wrapper" class="heart-button-wrapper">
      <div class="heart-shape">💕</div>
      <button id="show-on-btn" class="btn" onclick="revealSingleHeart()">Show On</button>
    </div>
  </div>

  <!-- 2. Single Heart Screen -->
  <div id="single-heart-screen">
    <div class="single-heart" onclick="openWishCard()">❤️</div>
    <p class="click-prompt">Tap the heart to open ✨</p>
  </div>

  <!-- Effect Container -->
  <div id="balloon-container" class="balloon-container"></div>

  <!-- Brighter Large Double Heart Background -->
  <div id="heart-bg">💕</div>

  <!-- 3. Birthday Wish Card -->
  <div id="main-card" class="card-container">
    <h1 class="title">Happy Birthday Juujuu! 💕🎉</h1>
    <p class="message">
      May your year ahead be filled with endless joy, unforgettable moments, and incredible success with me.
    </p>
    
    <button id="celebrate-btn" class="btn" onclick="celebrate()">Celebrate ✨</button>

    <!-- 4. Date Invitation Section -->
    <div id="date-section">
      <div id="first-question">
        <p class="date-text">will come out for dating in aug 9?</p>
        <div class="button-group">
          <button class="btn choice-btn" onclick="acceptDate()">i will</button>
          <button class="btn choice-btn" onclick="acceptDate()">i will</button>
        </div>
      </div>

      <!-- 5. Follow-up Affection Section -->
      <div id="affection-section">
        <p class="date-text">Yay! Will you give a Kiss, Hug, or Both on Aug 9? 😘</p>
        <div class="button-group">
          <button class="btn choice-btn" onclick="finalChoice('Kiss 💋')">Kiss 💋</button>
          <button class="btn choice-btn" onclick="finalChoice('Hug 🫂')">Hug 🫂</button>
          <button class="btn choice-btn" onclick="finalChoice('Both 💋🫂')">Both! 💋🫂</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 1. Reveal "Show On" heart button after 30 seconds
    setTimeout(() => {
      document.getElementById('heart-wrapper').style.display = 'flex';
    }, 30000);

    // 2. Hide Black Screen & Reveal Single Heart
    function revealSingleHeart() {
      const blackScreen = document.getElementById('black-screen');
      blackScreen.classList.add('fade-out');
      
      setTimeout(() => {
        blackScreen.style.display = 'none';
        document.getElementById('single-heart-screen').style.display = 'flex';
      }, 1000);
    }

    // 3. Click Single Heart to Open Wish Card
    function openWishCard() {
      document.getElementById('single-heart-screen').style.display = 'none';
      document.getElementById('main-card').style.display = 'block';
      startFlyingBalloons();
    }

    // Spawn Flying Heart Balloons
    function startFlyingBalloons() {
      const container = document.getElementById('balloon-container');
      const balloonIcons = ['💖', '❤️', '💕', '💗', '💓'];
      
      setInterval(() => {
        const balloon = document.createElement('div');
        balloon.className = 'heart-balloon';
        balloon.innerText = balloonIcons[Math.floor(Math.random() * balloonIcons.length)];
        balloon.style.left = Math.random() * 100 + 'vw';
        balloon.style.animationDuration = (6 + Math.random() * 4) + 's';
        
        container.appendChild(balloon);
        
        setTimeout(() => {
          balloon.remove();
        }, 10000);
      }, 500);
    }

    // 4. Celebrate Action
    function celebrate() {
      document.getElementById('heart-bg').style.display = 'block';
      document.getElementById('celebrate-btn').style.display = 'none';
      document.getElementById('date-section').style.display = 'block';

      triggerSideCheerPaper();
    }

    // 5. Handle "i will" click
    function acceptDate() {
      document.getElementById('first-question').style.display = 'none';
      document.getElementById('affection-section').style.display = 'block';

      triggerSideCheerPaper();
    }

    // 6. Handle Final Choice
    function finalChoice(option) {
      alert(`Can't wait for Aug 9! Sending you lots of love for choosing ${option}! ❤️✨`);
      triggerSideCheerPaper();
    }

    // Cheer Paper Cannon Burst from Left & Right Sides
    function triggerSideCheerPaper() {
      const colors = ['#ff0055', '#ff4081', '#8a2be2', '#9b51e0', '#ffffff', '#ffd700'];

      // Left Side Burst
      confetti({
        particleCount: 100,
        angle: 60,
        spread: 70,
        origin: { x: 0, y: 0.65 },
        colors: colors
      });

      // Right Side Burst
      confetti({
        particleCount: 100,
        angle: 120,
        spread: 70,
        origin: { x: 1, y: 0.65 },
        colors: colors
      });
    }
  </script>
</body>
</html>
